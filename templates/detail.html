<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ article.title }}</title>
    <style>
        .container { max-width: 800px; margin: 30px auto; padding: 20px; font-family: sans-serif; }
        .banner { width: 100%; border-radius: 8px; max-height: 400px; object-fit: cover; }
        .tag { display: inline-block; padding: 4px 10px; color: white; border-radius: 4px; margin-top: 15px; text-transform: uppercase; font-size: 0.85rem;}
        .content { margin-top: 20px; line-height: 1.6; font-size: 1.1rem; color: #333; }
        .back-btn { display: inline-block; margin-top: 30px; color: #3498db; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <img src="{{ article.image_src }}" alt="{{ article.title }}" class="banner">
        
        <span class="tag" style="background-color: {{ article.category_color }};">
            {{ article.category }}
        </span>
        
        <h1>{{ article.title }}</h1>
        <p style="color: #7f8c8d; font-size: 0.9rem;">โพสต์เมื่อ: {{ article.post_date }}</p>
        <hr>
        
        <div class="content">
            <p>{{ article.detail }}</p>
        </div>
        
        <a href="/" class="back-btn">← กลับสู่หน้าแรก</a>
    </div>

</body>
</html>
